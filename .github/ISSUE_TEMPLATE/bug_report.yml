name: Bug report
description: Report a bug in netls
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `netls --json`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: netls version
      description: Output of `netls --version`
      placeholder: netls 0.1.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      description: Output of `uname -a` (Linux) or macOS version
    validations:
      required: true

  - type: input
    id: rust
    attributes:
      label: Rust version (if built from source)
      description: Output of `rustc --version`

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Logs, screenshots, anything else
